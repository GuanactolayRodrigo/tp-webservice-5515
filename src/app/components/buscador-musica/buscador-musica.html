<div class="container mt-4">
  
  <div class="mb-4 row">
    <div class="col-sm-9 mb-2 mb-sm-0">
      <input type="text" class="form-control form-control-lg" placeholder="Buscar artista o tema musical..." 
             [(ngModel)]="buscado" >
    </div>
    <div class="col-sm-3 d-flex">
      <button class="btn btn-primary w-100 btn-lg" (click)="buscar()">Buscar</button>
    </div>
  </div>

  <div class="mb-5 p-3 bg-dark text-white rounded shadow text-center" *ngIf="urlAudioActual">
    <h5 class="mb-3">Reproduciendo Muestra</h5>
    
    <audio [src]="urlAudioActual" controls autoplay class="w-100"></audio>
  </div>

  <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
    <div class="col" *ngFor="let cancion of resultados">
      <div class="card h-100 shadow-sm text-center">
        
        <img [src]="cancion.album.cover_medium" class="card-img-top" alt="Portada">
        
        <div class="card-body d-flex flex-column">
          <h6 class="card-title text-truncate" [title]="cancion.title">{{ cancion.title }}</h6>
          <p class="card-text text-muted small mb-3">{{ cancion.artist.name }}</p>
          
          <button class="btn btn-outline-success mt-auto" (click)="reproducirCancion(cancion.preview)">
            Escuchar
          </button>
        </div>
        
      </div>
    </div>
  </div>

</div>
