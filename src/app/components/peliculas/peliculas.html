<main class="container-fluid px-4 py-5">
    
    <section class="text-center mb-5">
        <h2 class="mb-4">Portal de Películas</h2>
    </section>
    
    <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">

        <div class="col" *ngFor="let pelicula of peliculas">
            <div class="card text-white border-0 zoom-card overflow-hidden shadow h-100">
                
                <img [src]="pelicula.image" class="card-img object-fit-cover h-100" [alt]="pelicula.title">
                
                <div class="card-img-overlay d-flex flex-column justify-content-end card-overlay-custom"
                     style="background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);">
                    <h5 class="card-title fw-bold">{{ pelicula.title }}</h5>
                    <p class="card-text text-truncate">{{ pelicula.description }}</p>
                    
                    <button class="btn btn-warning mt-2 w-100" 
                            data-bs-toggle="modal" 
                            data-bs-target="#modalDetallePelicula"
                            (click)="seleccionarPelicula(pelicula)">
                        Ver detalles
                    </button>
                </div>

            </div>
        </div>

    </div>
</main>

<div class="modal fade" id="modalDetallePelicula" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content text-dark" *ngIf="peliculaSeleccionada">
            
            <div class="modal-header">
                <h5 class="modal-title fw-bold">{{ peliculaSeleccionada.title }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            
            <div class="modal-body p-0 d-flex flex-column flex-md-row">
                <img [src]="peliculaSeleccionada.image" class="w-50 object-fit-cover d-none d-md-block" [alt]="peliculaSeleccionada.title">
                <div class="p-4 w-100">
                    <p><strong>Año de lanzamiento:</strong> {{ peliculaSeleccionada.year }}</p>
                    <p><strong>Géneros:</strong> {{ peliculaSeleccionada.genre.join(', ') }}</p>
                    <p class="mt-3">{{ peliculaSeleccionada.description }}</p>
                </div>
            </div>

        </div>
    </div>
</div>
